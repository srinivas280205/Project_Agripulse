<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1e4620"/>
<title>AgriPulse — Smart Farming</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── ROOT ─────────────────── */
:root{
  --gd:#1e4620;--g:#2d6a2d;--gm:#4a7c3f;--gl:#7ab648;--gp:#e8f5e0;
  --e:#6b4226;--gold:#c8963e;--goldf:#f0c97a;
  --cream:#faf7f0;--sand:#f0e8d4;--card:#fff;
  --txt:#1a2e1a;--txs:#7a9a7a;
  --red:#c0392b;--org:#d4820a;--blue:#1a6891;
  --sh:0 2px 12px rgba(0,0,0,.09);
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--txt);}

/* ── HEADER ───────────────── */
#hdr{
  height:52px;background:var(--gd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;border-bottom:3px solid var(--gold);
  position:fixed;top:0;left:0;right:0;z-index:9999;
}
.logo{display:flex;align-items:center;gap:9px;}
.logo-ico{width:34px;height:34px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-txt h1{font-family:'Merriweather',serif;font-size:1rem;color:var(--goldf);line-height:1.1;}
.logo-txt p{font-size:0.58rem;color:#a8d8a0;letter-spacing:1px;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:7px;}
.lsw{display:flex;background:rgba(255,255,255,.12);border-radius:20px;overflow:hidden;border:1px solid rgba(200,150,62,.4);}
.lbtn{padding:4px 12px;border:none;background:transparent;color:#a8d8a0;font-size:0.75rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s;}
.lbtn.on{background:var(--gold);color:var(--gd);}
.live-dot{width:8px;height:8px;background:#7ab648;border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── MAIN LAYOUT ──────────── */
#app{
  position:fixed;top:52px;left:0;right:0;
  bottom:0; /* adjusted by JS for mobile */
  display:flex;
}

/* ── MAP ──────────────────── */
#mapWrap{position:relative;flex:1;min-width:0;height:100%;}
#map{width:100%;height:100%;z-index:1;}
.map-tip{
  position:absolute;top:10px;left:10px;z-index:400;
  background:rgba(20,50,22,.93);border:1px solid var(--gold);
  border-radius:var(--rs);padding:9px 13px;
  color:#e8f5e0;font-size:.75rem;max-width:200px;
  pointer-events:none;
}
.map-tip b{color:var(--goldf);display:block;margin-bottom:2px;font-size:.8rem;}
.coord-pill{
  position:absolute;bottom:10px;left:10px;z-index:400;
  background:rgba(20,50,22,.9);border:1px solid var(--gm);
  border-radius:20px;padding:4px 12px;color:#a8d8a0;
  font-size:.7rem;font-family:monospace;display:none;
}

/* ── SIDEBAR ──────────────── */
#sidebar{
  width:390px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--cream);border-left:2px solid var(--sand);
  height:100%;overflow:hidden;
}
.sb-tabs{
  display:flex;background:var(--gd);
  border-bottom:2px solid var(--gold);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.sb-tabs::-webkit-scrollbar{display:none;}
.stab{
  flex:1;min-width:50px;padding:8px 4px;
  border:none;background:transparent;
  color:#a8d8a0;font-size:.55rem;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  text-transform:uppercase;letter-spacing:.3px;transition:.15s;
  border-bottom:3px solid transparent;
}
.stab .si{font-size:1rem;line-height:1;}
.stab.on{color:var(--goldf);border-bottom-color:var(--gold);background:rgba(200,150,62,.1);}
.sb-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.sb-body::-webkit-scrollbar{width:3px;}
.sb-body::-webkit-scrollbar-thumb{background:var(--sand);}

/* ── MOBILE BOTTOM NAV ────── */
#bnav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--gd);border-top:2px solid var(--gold);
  z-index:9999;
}
.bnav-row{display:flex;}
.bnav-btn{
  flex:1;border:none;background:transparent;
  color:#a8d8a0;padding:8px 2px 7px;
  font-size:.55rem;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  text-transform:uppercase;letter-spacing:.2px;
}
.bnav-btn .ni{font-size:1.2rem;line-height:1;}
.bnav-btn.on{color:var(--goldf);}

/* ── MOBILE PANELS ────────── */
.mpanel{
  display:none;
  position:fixed;
  background:var(--cream);
  overflow-y:auto;
  z-index:8000;
}
/* desktop: slide from right */
@media(min-width:769px){
  .mpanel{top:52px;right:0;bottom:0;width:390px;border-left:2px solid var(--sand);}
  .mpanel.open{display:block;}
  #bnav{display:none!important;}
  #sidebar{display:flex!important;}
}
/* mobile: full screen sheet or bottom drawer */
@media(max-width:768px){
  #sidebar{display:none!important;}
  #bnav{display:block;}
  #app{bottom:54px;}
  .mpanel{left:0;right:0;bottom:54px;}
  /* advisory slides up */
  #mAdv{top:auto;height:65vh;border-radius:18px 18px 0 0;border-top:3px solid var(--gold);box-shadow:0 -6px 30px rgba(0,0,0,.2);}
  /* other panels full screen */
  #mFore,#mSoil,#mCal,#mPhoto,#mChat,#mMore{top:52px;}
  .mpanel.open{display:block;}
}

/* ── COMPONENTS ───────────── */
/* idle */
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;text-align:center;gap:12px;min-height:300px;}
.idle-ico{font-size:50px;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.idle h2{font-family:'Merriweather',serif;font-size:1.1rem;color:var(--g);}
.idle p{font-size:.82rem;color:var(--txs);line-height:1.65;max-width:260px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.chip{background:var(--gp);border:1px solid #b8dba0;border-radius:20px;padding:4px 11px;font-size:.72rem;color:var(--gm);font-weight:700;}
/* spinner */
.spinw{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;min-height:200px;}
.spin{width:36px;height:36px;border:4px solid var(--sand);border-top-color:var(--gm);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinw p{font-size:.82rem;color:var(--txs);}
/* page header */
.phdr{background:linear-gradient(135deg,var(--gd),var(--g));padding:14px 16px;flex-shrink:0;}
.phdr h2{font-family:'Merriweather',serif;font-size:.95rem;color:var(--goldf);margin-bottom:2px;}
.phdr p{font-size:.68rem;color:#a8d8a0;}
/* weather strip */
.wx{background:linear-gradient(135deg,var(--gd),var(--g));padding:16px 16px 14px;color:#fff;}
.wx-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.wx-cond{font-size:.92rem;font-weight:700;color:#d4f0c0;}
.wx-loc{font-size:.66rem;color:#a8d8a0;margin-top:2px;line-height:1.3;}
.wx-temp{font-family:'Merriweather',serif;font-size:2.5rem;color:var(--goldf);line-height:1;}
.wx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.wxc{background:rgba(255,255,255,.1);border-radius:var(--rs);padding:7px 4px;text-align:center;}
.wxc .wl{font-size:.56rem;color:#a8d8a0;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.wxc .wv{font-size:.82rem;font-weight:800;color:var(--goldf);}
/* alerts */
.alerts-bar{display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px;background:#fff8e6;border-bottom:1px solid #f0dda0;}
.atag{padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:800;}
.atag.r{background:#fde;color:var(--red);}
.atag.o{background:#fef3d8;color:var(--org);}
/* section */
.sec{padding:12px 14px;border-bottom:1px solid var(--sand);}
.sec-t{font-family:'Merriweather',serif;font-size:.8rem;color:var(--e);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.sec-t::after{content:'';flex:1;height:1px;background:var(--gold);opacity:.3;}
/* advisory list */
.alist{list-style:none;display:flex;flex-direction:column;gap:5px;}
.aitem{background:var(--card);border-left:3px solid var(--gm);border-radius:0 var(--rs) var(--rs) 0;padding:8px 11px;font-size:.78rem;line-height:1.5;box-shadow:0 1px 4px rgba(0,0,0,.05);}
/* disease card */
.dcard{background:var(--card);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.dico{font-size:1.7rem;}
.dname{font-size:.85rem;font-weight:800;}
.dact{font-size:.72rem;color:var(--txs);margin-top:1px;}
.risk{margin-left:auto;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:800;text-transform:uppercase;white-space:nowrap;}
.risk.lo{background:#e8f5e9;color:#2e7d32;}
.risk.me{background:#fff8e1;color:#f57f17;}
.risk.hi{background:#ffebee;color:#c62828;}
/* market */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mcard{background:var(--card);border-radius:var(--rs);padding:9px 11px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.mcrop{font-size:.68rem;color:var(--txs);margin-bottom:2px;}
.mprice{font-family:'Merriweather',serif;font-size:.95rem;color:var(--e);font-weight:700;}
.munit{font-size:.58rem;color:#aaa;margin-top:1px;}
/* buttons */
.btn-row{padding:10px 14px 14px;display:flex;flex-direction:column;gap:7px;}
.btnp{width:100%;background:linear-gradient(135deg,var(--gm),var(--gd));color:#fff;border:none;border-radius:var(--r);padding:12px 14px;font-size:.83rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 3px 10px rgba(42,100,42,.25);transition:.15s;}
.btnp:active{transform:scale(.98);opacity:.9;}
.btnp.stop{background:linear-gradient(135deg,#c0392b,#922b21);}
.btns{width:100%;background:transparent;color:var(--e);border:2px solid var(--gold);border-radius:var(--r);padding:10px 14px;font-size:.8rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;}
.btns:active{background:var(--gold);color:var(--gd);}
.ts{text-align:center;font-size:.62rem;color:#aaa;padding:5px;}
/* soil */
.soil-card{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);}
.soil-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sico{font-size:2rem;}
.sname{font-family:'Merriweather',serif;font-size:.9rem;color:var(--e);}
.sname2{font-size:.7rem;color:var(--txs);margin-top:1px;}
.srows{display:flex;flex-direction:column;gap:0;}
.srow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f0e8;font-size:.76rem;}
.srow:last-child{border:none;}
.slbl{color:var(--txs);}
.sval{font-weight:700;text-align:right;max-width:58%;}
.stip{background:var(--gp);border-radius:var(--rs);padding:8px 11px;font-size:.74rem;color:var(--g);margin-top:8px;line-height:1.5;border-left:3px solid var(--gm);}
/* yield */
.ycard{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);}
.ysel{width:100%;padding:9px 11px;border:2px solid var(--sand);border-radius:var(--rs);font-size:.8rem;font-family:'Nunito',sans-serif;color:var(--txt);background:#fff;margin-bottom:10px;cursor:pointer;}
.ysel:focus{outline:none;border-color:var(--gm);}
.yresult{display:none;text-align:center;padding:8px 0;}
.ybig{font-family:'Merriweather',serif;font-size:2rem;color:var(--g);}
.yunit{font-size:.7rem;color:var(--txs);margin-bottom:6px;}
.ybar-bg{height:9px;background:var(--sand);border-radius:5px;overflow:hidden;margin:6px 0;}
.ybar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gl),var(--gm));transition:width .8s;}
.ystat{font-size:.76rem;color:var(--txs);}
/* forecast */
.fscroll{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none;}
.fscroll::-webkit-scrollbar{display:none;}
.fday{flex-shrink:0;background:var(--card);border-radius:var(--rs);padding:9px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);min-width:64px;}
.fdate{font-size:.62rem;color:var(--txs);margin-bottom:3px;}
.ficon{font-size:1.3rem;line-height:1;margin:2px 0;}
.fmax{font-size:.82rem;font-weight:800;color:var(--e);}
.fmin{font-size:.7rem;color:var(--txs);}
.frain{font-size:.62rem;color:var(--blue);margin-top:2px;}
.chart-box{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:var(--sh);margin-top:8px;}
.chart-box canvas{max-height:150px;}
/* KVK */
.kvk-card{background:var(--card);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;box-shadow:var(--sh);}
.kvk-name{font-family:'Merriweather',serif;font-size:.85rem;color:var(--e);margin-bottom:6px;}
.kvk-row{display:flex;align-items:center;gap:7px;font-size:.74rem;color:#444;padding:2px 0;}
.kvk-row a{color:var(--blue);text-decoration:none;font-weight:700;}
/* profit calc */
.pcalc{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pfld{display:flex;flex-direction:column;gap:3px;}
.pfld label{font-size:.67rem;color:var(--txs);text-transform:uppercase;font-weight:800;letter-spacing:.3px;}
.pfld input,.pfld select{padding:8px 10px;border:2px solid var(--sand);border-radius:var(--rs);font-size:.8rem;font-family:'Nunito',sans-serif;color:var(--txt);background:#fff;}
.pfld input:focus,.pfld select:focus{outline:none;border-color:var(--gm);}
.presult{background:var(--gp);border-radius:var(--rs);padding:12px;margin-top:10px;display:none;}
.presult-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.78rem;border-bottom:1px solid #c0e0b0;}
.presult-row:last-child{border:none;font-weight:800;font-size:.85rem;}
/* field notes */
.note-item{background:var(--card);border-radius:var(--r);padding:10px 12px;box-shadow:var(--sh);border-left:3px solid var(--gold);margin-bottom:7px;}
.note-date{font-size:.62rem;color:var(--txs);margin-bottom:3px;}
.note-text{font-size:.78rem;color:var(--txt);line-height:1.5;}
.note-loc{font-size:.62rem;color:var(--gm);margin-top:2px;}
.ntextarea{width:100%;padding:9px 11px;border:2px solid var(--sand);border-radius:var(--rs);font-size:.8rem;font-family:'Nunito',sans-serif;resize:vertical;min-height:70px;color:var(--txt);}
.ntextarea:focus{outline:none;border-color:var(--gm);}
/* share */
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sbtn{padding:11px 8px;border:none;border-radius:var(--r);font-size:.76rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;}
.sbtn:active{transform:scale(.97);}
.sbtn.wa{background:#25D366;color:#fff;}
.sbtn.pdf{background:var(--red);color:#fff;}
.sbtn.sms{background:var(--blue);color:#fff;}
.sbtn.cp{background:var(--e);color:var(--goldf);}
/* photo */
.upload-box{margin:12px 14px;background:var(--card);border:2px dashed var(--gold);border-radius:var(--r);padding:24px 16px;text-align:center;cursor:pointer;transition:.2s;}
.upload-box:hover,.upload-box:active{border-color:var(--gm);background:var(--gp);}
.upload-box .ui{font-size:2.4rem;margin-bottom:8px;}
.upload-box h3{font-family:'Merriweather',serif;font-size:.9rem;color:var(--e);margin-bottom:4px;}
.upload-box p{font-size:.74rem;color:var(--txs);}
input[type=file]{display:none;}
.cam-row{display:flex;gap:7px;margin:0 14px 12px;}
.cbtn{flex:1;padding:10px;border:none;border-radius:var(--r);font-size:.78rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;}
.cbtn:active{opacity:.8;}
.cbtn.gal{background:var(--gm);color:#fff;}
.cbtn.cam{background:var(--e);color:var(--goldf);}
.prev-wrap{margin:0 14px 10px;display:none;}
.prev-img{width:100%;border-radius:var(--r);max-height:190px;object-fit:cover;box-shadow:var(--sh);}
.scan-result{margin:0 14px 14px;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);display:none;}
.scan-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f5f0e8;}
.scan-em{font-size:1.8rem;}
.scan-name{font-family:'Merriweather',serif;font-size:.9rem;color:var(--e);}
.scan-sub{font-size:.68rem;color:var(--txs);margin-top:1px;}
.scan-rows{padding:5px 14px 8px;}
.scan-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f0e8;font-size:.74rem;}
.scan-row:last-child{border:none;}
.slbl2{color:var(--txs);}
.sval2{font-weight:700;text-align:right;max-width:58%;}
.treat-box{background:var(--gp);border-top:1px solid #c0e0b0;padding:10px 14px;}
.treat-box h4{font-size:.68rem;font-weight:800;color:var(--gm);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.treat-item{font-size:.74rem;color:var(--txt);padding:2px 0;display:flex;gap:6px;line-height:1.4;}
.tips-sec{padding:4px 14px 14px;display:flex;flex-direction:column;gap:6px;}
.tip{background:var(--card);border-radius:var(--rs);padding:9px 12px;font-size:.76rem;line-height:1.5;border-left:3px solid var(--gold);box-shadow:0 1px 3px rgba(0,0,0,.05);}
/* calendar */
.mrow{display:flex;overflow-x:auto;gap:5px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--sand);scrollbar-width:none;}
.mrow::-webkit-scrollbar{display:none;}
.mchip{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:.7rem;font-weight:700;border:2px solid transparent;cursor:pointer;background:var(--sand);color:var(--txs);transition:.15s;}
.mchip.cur{border-color:var(--gold);background:#fef9ee;color:var(--e);}
.mchip.sel{background:var(--gm);color:#fff;border-color:var(--gm);}
.clist{padding:10px 14px;display:flex;flex-direction:column;gap:9px;}
.ccard{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.ctop{padding:10px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid #f5f0e8;}
.c-ico{font-size:1.6rem;}
.c-en{font-family:'Merriweather',serif;font-size:.87rem;color:var(--e);}
.c-ta{font-size:.68rem;color:var(--txs);margin-top:1px;}
.stag{margin-left:auto;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:800;text-transform:uppercase;}
.sk{background:#e8f5e9;color:#2e7d32;}
.sr{background:#e3f2fd;color:#1565c0;}
.sz{background:#fff8e1;color:#f57f17;}
.cstats{padding:8px 13px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.csl{font-size:.6rem;color:#aaa;text-transform:uppercase;letter-spacing:.3px;}
.csv{font-size:.76rem;color:var(--txt);font-weight:700;margin-top:1px;}
.bwrap{padding:0 13px 10px;}
.blbl{font-size:.6rem;color:#aaa;margin-bottom:4px;}
.btrack{display:flex;gap:2px;}
.bcell{flex:1;height:6px;border-radius:2px;background:#f0ebe0;}
.bcell.sow{background:var(--gm);}
.bcell.gro{background:#a8d8a0;}
.bcell.har{background:var(--gold);}
.bleg{display:flex;gap:10px;margin-top:4px;}
.bl{display:flex;align-items:center;gap:3px;font-size:.58rem;color:#888;}
.bldot{width:7px;height:7px;border-radius:2px;}
/* chat */
.chatbox{display:flex;flex-direction:column;height:100%;}
.chat-msgs{overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:200px;max-height:350px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--sand);}
.msg{max-width:85%;padding:9px 12px;border-radius:var(--r);font-size:.78rem;line-height:1.55;}
.msg.bot{background:var(--gp);border-bottom-left-radius:3px;align-self:flex-start;}
.msg.user{background:var(--gm);color:#fff;border-bottom-right-radius:3px;align-self:flex-end;}
.typing-msg{background:var(--gp);align-self:flex-start;border-radius:var(--r);padding:10px 14px;}
.dot{width:6px;height:6px;background:var(--gm);border-radius:50%;display:inline-block;animation:td 1s infinite;margin:0 2px;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
.quick-qs{display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px 5px;}
.qq{background:var(--gp);border:1px solid #b8dba0;border-radius:20px;padding:4px 10px;font-size:.7rem;color:var(--gm);font-weight:700;cursor:pointer;}
.qq:active{background:var(--gm);color:#fff;}
.chat-inp-row{display:flex;gap:7px;padding:8px 14px 10px;border-top:1px solid var(--sand);background:#fff;flex-shrink:0;}
.chat-inp{flex:1;padding:9px 12px;border:2px solid var(--sand);border-radius:20px;font-size:.8rem;font-family:'Nunito',sans-serif;color:var(--txt);}
.chat-inp:focus{outline:none;border-color:var(--gm);}
.chat-send{background:var(--gm);color:#fff;border:none;border-radius:20px;padding:9px 16px;font-size:.8rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;}
.chat-send:active{background:var(--gd);}
/* pwa/deploy */
.pwa-btn{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:var(--r);padding:13px;font-size:.85rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(42,100,42,.28);transition:.15s;}
.pwa-btn:active{transform:scale(.98);}
.dep-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:10px;}
.dep-top{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f5f0e8;}
.dep-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.dep-name{font-family:'Merriweather',serif;font-size:.88rem;color:var(--e);}
.dep-sub{font-size:.66rem;color:var(--txs);margin-top:1px;}
.ftag{margin-left:auto;background:var(--gp);color:var(--gm);padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:800;}
.dep-steps{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
.dstep{display:flex;gap:8px;align-items:flex-start;}
.dsn{width:18px;height:18px;min-width:18px;background:var(--gm);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;margin-top:2px;}
.dst{font-size:.74rem;color:#444;line-height:1.55;}
.code{background:#f5f0e8;border-radius:4px;padding:4px 8px;font-family:monospace;font-size:.68rem;color:var(--gd);margin-top:2px;display:block;overflow-x:auto;white-space:nowrap;}
.dep-note{margin:0 14px 14px;background:#fef9ee;border-radius:var(--r);padding:10px 13px;font-size:.74rem;color:#7a5500;line-height:1.6;border-left:3px solid var(--gold);}
</style>

var leafletMap, mapMarker;

function initMap(){
  leafletMap = L.map('map', {zoomControl:false}).setView([11.0, 78.0], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(leafletMap);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  leafletMap.on('click', function(e){
    var lat = e.latlng.lat, lng = e.latlng.lng;
    LATLON = {lat:lat, lng:lng};
    if(mapMarker) leafletMap.removeLayer(mapMarker);
    mapMarker = L.marker([lat,lng], {
      icon: L.divIcon({
        className:'',
        html: '<div style="width:14px;height:14px;background:#c8963e;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>',
        iconAnchor:[7,7]
      })
    }).addTo(leafletMap);
    var cp = document.getElementById('coordPill');
    cp.textContent = '📍 ' + lat.toFixed(4) + ', ' + lng.toFixed(4);
    cp.style.display = 'block';
    fetchData(lat, lng);
    if(AUTO_TIMER) clearInterval(AUTO_TIMER);
    AUTO_TIMER = setInterval(function(){ if(LATLON) fetchData(LATLON.lat, LATLON.lng); }, 600000);
    if(window.innerWidth <= 768) mTab('adv');
  });
}

function rerender(){
  if(window.innerWidth <= 768){
    var pm = {adv:'mAdv',fore:'mFore',soil:'mSoil',cal:'mCal',photo:'mPhoto',chat:'mChat',more:'mMore'};
    if(MOB_TAB !== 'map' && pm[MOB_TAB]){
      renderInto(pm[MOB_TAB], MOB_TAB);
    }
  } else {
    renderInto('sbBody', DESK_TAB);
  }
}

function renderInto(cid, tab){
  var el = document.getElementById(cid); if(!el) return;
  var fns = {adv:buildAdv, fore:buildFore, soil:buildSoil, cal:buildCal, photo:buildPhoto, chat:buildChat, more:buildMore};
  var fn = fns[tab] || buildAdv;

  if(tab==='fore' && DATA && DATA.state==='done') setTimeout(drawChart, 100);
}

// ══ FETCH DATA ════════════════════════════════
function fetchData(lat, lon){
  DATA = {state:'loading'};
  rerender();
  fetch('/api/advisory?lat='+lat+'&lon='+lon)
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(json.error) throw new Error(json.error);
      var w = json.weather;
      var res = runRules(w);
      DATA = {
        state:'done',
        weather: w,
        loc: lat.toFixed(4)+', '+lon.toFixed(4),
        advice: res.advice,
        alerts: res.alerts,
        disease: scanDis(w),
        mandi: json.mandi,
        soil: json.soil,
        kvk: json.kvk || [],
        forecast: json.forecast || [],
        ts: json.timestamp
      };
      // reverse geocode
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
        .then(function(r){ return r.json(); })
        .then(function(gd){
          var a = gd.address || {};
          DATA.loc = [a.village||a.suburb||a.town||a.city, a.state_district, a.state].filter(Boolean).join(', ') || DATA.loc;
          rerender();
        }).catch(function(){ rerender(); });
    })
    .catch(function(err){
      DATA = {state:'error', msg:err.message};
      rerender();
    });
}

function runRules(w){
  var A = TX[LNG].adv, advice = [], alerts = [];
  var t=w.temperature, h=w.humidity, rain=w.precipitation, wind=w.wind_speed, uv=w.uv_index||0;
  if(rain>5) advice.push(A.no_irr);
  else if(h<35&&t>37){advice.push(A.drought);alerts.push('DROUGHT');}
  else if(h<45&&t>33){advice.push(A.high_irr);alerts.push('DROUGHT');}
  else if(h<55) advice.push(A.mod_irr);
  else advice.push(A.ok_moist);
  if(h>82&&t>25){advice.push(A.fungal);alerts.push('DISEASE');}
  else if(h>70) advice.push(A.monitor);
  else advice.push(A.low_pest);
  if(wind>25){advice.push(A.no_spray);alerts.push('WIND');}
  else if(rain>2) advice.push(A.rain_spray);
  else advice.push(A.ok_spray);
  if(t>40){advice.push(A.heat);alerts.push('HEAT');}
  else if(t<15) advice.push(A.cold);
  else advice.push(A.ok_temp(t));
  advice.push(uv>7?A.uv_hi:A.uv_ok);
  return {advice:advice, alerts:alerts};
}

function scanDis(w){
  var h=w.humidity, t=w.temperature, rain=w.precipitation;
  var d = TX[LNG].diseases;
  if(h>82&&t>27&&rain>3) return d[2]; // powdery mildew
  if(h>78&&t>25) return d[1];         // stem borer
  if(h>68) return d[0];               // leaf blight
  if(rain>5) return d[3];             // brown spot
  return d[4];                        // healthy
}

function mandiLocal(){
  var d=new Date(), s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  function r(x){ return ((Math.sin(x)*9301+49297)%233280)/233280; }
  return {'Paddy (Raw)':Math.round(2100+r(s)*300),'Tomato':Math.round(1200+r(s*2)*1000),'Onion':Math.round(2000+r(s*3)*800),'Banana':Math.round(1000+r(s*4)*400),'Sugarcane':Math.round(3100+r(s*5)*200),'Groundnut':Math.round(5500+r(s*6)*600),'Cotton':Math.round(6200+r(s*7)*500),'Maize':Math.round(1800+r(s*8)*300)};
}

function wIcon(code){
  if(code===0) return '☀️';
  if([1,2,3].indexOf(code)>=0) return '⛅';
  if([45,48].indexOf(code)>=0) return '🌫️';
  if([51,53,55].indexOf(code)>=0) return '🌦️';
  if([61,63,65].indexOf(code)>=0) return '🌧️';
  if([80,81,82].indexOf(code)>=0) return '⛈️';
  if([95,96,99].indexOf(code)>=0) return '🌩️';
  return '🌈';
}
function wCond(code){
  if(code===0) return '☀️ Clear Sky';
  if([1,2,3].indexOf(code)>=0) return '🌤️ Partly Cloudy';
  if([45,48].indexOf(code)>=0) return '🌫️ Foggy';
  if([51,53,55].indexOf(code)>=0) return '🌦️ Drizzle';
  if([61,63,65].indexOf(code)>=0) return '🌧️ Rain';
  if([80,81,82].indexOf(code)>=0) return '⛈️ Showers';
  if([95,96,99].indexOf(code)>=0) return '🌩️ Thunderstorm';
  return '🌈 Mixed';
}

function calcYield(crop){
  if(!DATA||!DATA.weather) return;
  var base={Paddy:4.2,Tomato:25,Onion:15,Sugarcane:80,Groundnut:2,Cotton:1.8,Maize:5.5,Banana:30};
  var b=base[crop]||5, w=DATA.weather, f=1.0;
  var t=w.temperature, h=w.humidity, rain=w.precipitation;
  if(t>=22&&t<=35)f+=.1; else if(t>40)f-=.25; else if(t<15)f-=.2;
  if(h>=55&&h<=80)f+=.05; else if(h>85)f-=.1;
  if(rain>5)f+=.05;
  var pred=Math.round(b*Math.max(.4,Math.min(1.4,f))*100)/100;
  var pct=Math.round((pred/b)*100);
  var st=pct>=100?'🌟 Excellent':pct>=85?'✅ Good':pct>=70?'⚠️ Average':'❌ Below Average';
  var el=document.getElementById('yresult'); if(!el) return;
  el.style.display='block';
  el.innerHTML='<div class="ybig">'+pred+'</div><div class="yunit">'+TX[LNG].yUnit+' ('+TX[LNG].sYield+')</div><div class="ybar-bg"><div class="ybar-fill" style="width:'+Math.min(pct,100)+'%"></div></div><div class="ystat">'+st+' — '+pct+'% of expected</div>';
}

    }).join('');

function sendChat(){
  var inp=document.getElementById('chatIn'); if(!inp) return;
  var q=inp.value.trim(); if(!q) return;
  inp.value='';
  addMsg('user', q);
  var tid='t'+Date.now();
  addTyping(tid);
  var ctx='';
  if(DATA&&DATA.state==='done') ctx='Location: '+DATA.loc+'. Temp: '+DATA.weather.temperature+'°C, Humidity: '+DATA.weather.humidity+'%, Rain: '+DATA.weather.precipitation+'mm. Soil: '+(DATA.soil?DATA.soil.type:'Unknown')+'. ';
  var sys='You are AgriPulse, an expert farming assistant for Tamil Nadu farmers. '+ctx+'Answer questions about crops, pests, diseases, irrigation, fertilizers, and market prices. Be concise (under 80 words) and practical. If asked in Tamil, reply in Tamil. If in English, reply in English.';
  CHAT_HIST.push({role:'user', content:q});
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:CHAT_HIST})
  }).then(function(r){return r.json();})
  .then(function(data){
    var reply=(data.content||[]).map(function(c){return c.text||'';}).join('')||'Sorry, I could not answer that. Please try again.';
    CHAT_HIST.push({role:'assistant',content:reply});
    removeTyping(tid);
    addMsg('bot', reply);
  }).catch(function(){
    removeTyping(tid);
    addMsg('bot', LNG==='ta'?'மன்னிக்கவும், பதில் கிடைக்கவில்லை. மீண்டும் முயற்சிக்கவும்.':'Sorry, could not get a response. Please try again.');
  });
}

}

// ══ VOICE ═════════════════════════════════════
function toggleVoice(){
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();setVoiceBtn(false);return;}
  if(!DATA||DATA.state!=='done') return;
  var t=TX[LNG], w=DATA.weather, dis=DATA.disease;
  var text, lc;
  if(LNG==='ta'){
    text='அக்ரிபல்ஸ் வயல் ஆலோசனை. இடம்: '+DATA.loc+'. வெப்பநிலை '+w.temperature+' டிகிரி. ஈரப்பதம் '+w.humidity+' சதவீதம். '+DATA.advice.join('. ')+'. நோய் ஸ்கேன்: '+dis.name+'. '+dis.action+'. மண்டி விலைகளை திரையில் பாருங்கள்.';
    lc='ta-IN';
  } else {
    text='AgriPulse Field Advisory. Location: '+DATA.loc+'. Temperature '+w.temperature+' degrees. Humidity '+w.humidity+' percent. '+DATA.advice.join('. ')+'. Disease: '+t.riskL[dis.risk]+' of '+dis.name+'. '+dis.action+'. Check market prices on screen.';
    lc='en-IN';
  }
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lc; u.rate=0.88; u.pitch=1.0;
  var vs=window.speechSynthesis.getVoices();
  var bv=vs.filter(function(v){return v.lang===lc;})[0] || vs.filter(function(v){return v.lang.indexOf(lc.split('-')[0])===0;})[0];
  if(bv) u.voice=bv;
  u.onstart=function(){setVoiceBtn(true);};
  u.onend=function(){setVoiceBtn(false);};
  u.onerror=function(){setVoiceBtn(false);};
  window.speechSynthesis.speak(u);
}
function setVoiceBtn(on){
  var b=document.getElementById('voiceBtn'); if(!b) return;
  b.textContent=on?TX[LNG].btnStop:TX[LNG].btnVoice;
  b.classList.toggle('stop',on);
}

// ══ PROFIT CALC ═══════════════════════════════
function calcProfit(){
  var area=parseFloat(document.getElementById('parea').value)||1;
  var cost=parseFloat(document.getElementById('pcost').value)||0;
  var yld=parseFloat(document.getElementById('pyield').value)||0;
  var crop=document.getElementById('pcrop').value||'Paddy';
  var prices=DATA&&DATA.mandi?DATA.mandi:mandiLocal();
  var pkey=Object.keys(prices).filter(function(k){return k.toLowerCase().indexOf(crop.toLowerCase())>=0;})[0]||Object.keys(prices)[0];
  var pricePerKg=(prices[pkey]||3000)/100;
  var revenue=Math.round(yld*area*pricePerKg*100);
  var profit=revenue-cost;
  var t=TX[LNG], el=document.getElementById('presult'); if(!el) return;
  el.style.display='block';
  el.innerHTML='<div class="presult-row"><span>'+t.revenue+'</span><span>₹'+revenue.toLocaleString('en-IN')+'</span></div><div class="presult-row"><span>'+t.totalCost+'</span><span>₹'+cost.toLocaleString('en-IN')+'</span></div><div class="presult-row"><span>'+t.netProfit+'</span><span style="color:'+(profit>=0?'#2d6a2d':'#c0392b')+';font-weight:800;">₹'+Math.abs(profit).toLocaleString('en-IN')+' '+(profit>=0?'✅ Profit':'❌ Loss')+'</span></div>';
}

function saveNote(){

}

function shareWA(){ window.open('https://wa.me/?text='+encodeURIComponent(getAdvText()),'_blank'); }
